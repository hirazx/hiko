name: Build KernelSU Manager

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Fix missing uapi headers
      run: |
        # Copy header files from kernel to manager
        cp -r kernel/uapi manager/app/src/main/cpp/
        cp -r kernel/include manager/app/src/main/cpp/ || true
        ls -la manager/app/src/main/cpp/uapi/
        
    - name: Build with Gradle
      run: |
        cd manager
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-APK
        path: manager/app/build/outputs/apk/release/*.apk
